apiVersion: solr.apache.org/v1beta1
kind: SolrCloud

metadata:
  name: solr-cloud-nrt
  namespace: solr-system

spec:
  replicas: 5

  solrImage:
    repository: solr
    tag: 9.10.1

  # =========================================================
  # JVM SETTINGS
  # =========================================================
  solrJavaMem: "-Xms30g -Xmx30g"

  solrOpts: >-
    -Dsolr.node.roles=data:on,overseer:preferred
    -Dnode_type=indexing
    -Dsolr.attr.node_type=indexing
    -Dsolr.index.ramBufferMB=1024
    -Dsolr.cache.filter.maxRamMB=512
    -Dsolr.cache.filter.autowarm=32
    -Dsolr.cache.queryResult.maxRamMB=512
    -Dsolr.cache.queryResult.autowarm=16
    -Dsolr.cache.document.maxRamMB=256
    -Dsolr.cache.document.autowarm=0
    -Dsolr.autoSoftCommit.maxTime=120000
    -Dsolr.log.level=WARN
    -DzkClientTimeout=60000
    -DdistribUpdateConnTimeout=30000
    -DdistribUpdateSoTimeout=1200000
    -Dsolr.httpconf.socket.timeout=1200000
    -Dsolr.replication.socketTimeout=1200000
    -XX:+UseG1GC
    -XX:MaxGCPauseMillis=200
    -XX:+ParallelRefProcEnabled
    -XX:+AlwaysPreTouch
    -XX:+DisableExplicitGC
    -XX:InitiatingHeapOccupancyPercent=30
    -XX:MaxDirectMemorySize=12g
    -Xlog:gc*:file=/var/solr/logs/gc.log:time,uptime:filecount=5,filesize=100m

  # =========================================================
  # SCALING
  # =========================================================
  scaling:
    populatePodsOnScaleUp: false
    vacatePodsOnScaleDown: true

  updateStrategy:
    method: Managed

    managed:
      maxPodsUnavailable: 1

  # =========================================================
  # KUBERNETES SETTINGS
  # =========================================================
  customSolrKubeOptions:

    podOptions:

      # -----------------------------------------------------
      # INDEXING NODE POOL
      # -----------------------------------------------------
      nodeSelector:
        hardware-type: indexing-nodes

      terminationGracePeriodSeconds: 600

      # -----------------------------------------------------
      # POD PLACEMENT
      # -----------------------------------------------------
      affinity:

        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100

              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    technology: solr-cloud

                topologyKey: kubernetes.io/hostname

      topologySpreadConstraints:
        - maxSkew: 1

          topologyKey: kubernetes.io/hostname

          whenUnsatisfiable: ScheduleAnyway

          labelSelector:
            matchLabels:
              technology: solr-cloud

      # -----------------------------------------------------
      # RESOURCE SETTINGS
      # -----------------------------------------------------
      resources:

        requests:
          cpu: "6"
          memory: "48Gi"

        limits:
          cpu: "10"
          memory: "64Gi"

      # -----------------------------------------------------
      # HEALTH PROBES
      # -----------------------------------------------------
      startupProbe:
        failureThreshold: 60
        periodSeconds: 20
        timeoutSeconds: 15

      livenessProbe:
        initialDelaySeconds: 60
        periodSeconds: 20
        timeoutSeconds: 15
        failureThreshold: 5

      readinessProbe:
        initialDelaySeconds: 30
        periodSeconds: 15
        timeoutSeconds: 15
        failureThreshold: 5

      # -----------------------------------------------------
      # SECURITY
      # -----------------------------------------------------
      podSecurityContext:
        fsGroup: 8983

      containerSecurityContext:
        runAsUser: 8983
        runAsGroup: 8983
        runAsNonRoot: true

  # =========================================================
  # STORAGE
  # =========================================================
  dataStorage:

    persistent:

      reclaimPolicy: Retain

      pvcTemplate:

        spec:
          storageClassName: solr-ssd-xfs

          accessModes:
            - ReadWriteOnce

          resources:
            requests:
              storage: 10Ti

  # =========================================================
  # SHARED ZOOKEEPER
  # =========================================================
  zookeeperRef:

    connectionInfo:
      internalConnectionString: "solr-shared-zk-0.solr-shared-zk-headless.solr-system.svc.cluster.local:2181,solr-shared-zk-1.solr-shared-zk-headless.solr-system.svc.cluster.local:2181,solr-shared-zk-2.solr-shared-zk-headless.solr-system.svc.cluster.local:2181,solr-shared-zk-3.solr-shared-zk-headless.solr-system.svc.cluster.local:2181,solr-shared-zk-4.solr-shared-zk-headless.solr-system.svc.cluster.local:2181"

  # =========================================================
  # AVAILABILITY
  # =========================================================
  availability:

    podDisruptionBudget:
      enabled: true
      method: ClusterWide
