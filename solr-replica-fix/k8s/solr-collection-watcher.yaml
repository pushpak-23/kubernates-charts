apiVersion: v1
kind: ServiceAccount
metadata:
  name: solr-collection-watcher
  namespace: solr-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: solr-collection-watcher
  namespace: solr-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: solr-collection-watcher
  template:
    metadata:
      labels:
        app: solr-collection-watcher
    spec:
      serviceAccountName: solr-collection-watcher
      containers:
        - name: watcher
          image: pushpak23/solr-watcher:latest
          imagePullPolicy: Always
          env:
            - name: SOLR_BASE_URL
              value: http://solr-nrt-lb.solr-system.svc.cluster.local:8983/solr
            - name: POLL_INTERVAL_SECONDS
              value: "30"
            - name: COLLECTION_READY_TIMEOUT_SECONDS
              value: "180"
            - name: STATE_FILE
              value: /state/seen-collections.json
            - name: PULL_NODE_REGEX
              value: solr-cloud-pull-solrcloud
            - name: PULL_REPLICA_TYPE
              value: PULL
            - name: PULL_REPLICAS_PER_SHARD
              value: "1"
            - name: QUERY_NODE_REGEX
              value: solr-cloud-nrt-solrcloud
            - name: QUERY_REPLICA_TYPE
              value: NRT
            - name: QUERY_REPLICAS_PER_SHARD
              value: "2"
          volumeMounts:
            - name: state
              mountPath: /state
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: state
          emptyDir: {}